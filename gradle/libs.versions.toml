[versions]
activityKtx = "1.13.0"
annotation = "1.10.0"
appcompat = "1.7.1"
ktor = "3.5.0"
mockk = "1.14.11"
slf4jNop = "2.0.18"
supabase = "3.6.0"
cardview = "1.0.0"
collectionKtx = "1.6.0"
constraintlayout = "2.2.1"
