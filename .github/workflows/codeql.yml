name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger it manually from the UI

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # This handles the Gradle installation so you don't need the binary JAR
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'java-kotlin'
        # Setting build-mode to manual tells GitHub NOT to use its "autobuilder"
        build-mode: manual

    - name: Build Aisleron
      # -PincludeProfiles=false handles the F-Droid/GitHub mismatch
      # assembleDebug bypasses your signing key check
      run: ./gradlew assembleDebug -PincludeProfiles=false

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:java-kotlin"
